<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Contábil - Premium</title>
    <!-- Fonte Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Script para evitar Flash de Tema (FOUC) -->
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>

<body>
    <div class="theme-toggle-wrapper fixed-top-right">
        <button class="theme-toggle-btn" id="themeToggleBtn" title="Alternar Tema" aria-label="Alternar Tema">
            <i class="ph ph-moon"></i>
        </button>
    </div>

    <div class="app-container">
        <!-- Landing Page e Login Section -->
        <main class="landing-main">
            <div class="glass-card login-container">
                <div class="brand">
                    <i class="ph ph-buildings brand-icon"></i>
                    <h1>Contabilidade<span>Pro</span></h1>
                    <p>Gestão Empresarial Inteligente</p>
                </div>

                <div class="services-overview">
                    <div class="service-tag"><i class="ph ph-briefcase"></i> Abertura de Empresa</div>
                    <div class="service-tag"><i class="ph ph-file-text"></i> Imposto de Renda</div>
                    <div class="service-tag"><i class="ph ph-users"></i> Gestão de Folha</div>
                    <div class="service-tag"><i class="ph ph-chart-line-up"></i> Planejamento Tributário</div>
                </div>

                <form id="formLogin" class="login-form" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <label for="email_login" class="visually-hidden">E-mail de acesso</label>
                        <i class="ph ph-envelope-simple"></i>
                        <input id="email_login" type="email" placeholder="E-mail de acesso" required
                            aria-label="E-mail">
                    </div>
                    <div class="input-group">
                        <label for="senha_login" class="visually-hidden">Senha</label>
                        <i class="ph ph-lock-key"></i>
                        <input id="senha_login" type="password" placeholder="Senha" required aria-label="Senha">
                    </div>

                    <div class="login-actions mt-2 flex-col gap-1">
                        <button type="submit" class="btn-primary w-full p-1">
                            <i class="ph ph-sign-in"></i> Entrar no Sistema
                        </button>
                        <div class="auth-options">
                            <a href="#" onclick="toggleForm('register')" class="auth-link-primary">Criar uma
                                Conta</a>
                            <a href="#" onclick="toggleForm('forgot')" class="auth-link-secondary">Esqueci a senha</a>
                        </div>
                    </div>
                </form>

                <!-- Cadastro de Cliente -->
                <form id="formRegister" class="login-form d-none" onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <label for="nome_cadastro" class="visually-hidden">Nome Completo</label>
                        <i class="ph ph-user"></i>
                        <input id="nome_cadastro" type="text" placeholder="Seu Nome Completo" required
                            aria-label="Nome Completo">
                    </div>
                    <div class="input-group">
                        <label for="email_cadastro" class="visually-hidden">E-mail</label>
                        <i class="ph ph-envelope-simple"></i>
                        <input id="email_cadastro" type="email" placeholder="E-mail de Cadastro" required
                            aria-label="E-mail">
                    </div>
                    <div class="input-group">
                        <label for="senha_cadastro" class="visually-hidden">Senha</label>
                        <i class="ph ph-lock-key"></i>
                        <input id="senha_cadastro" type="password" placeholder="Crie uma Senha forte" required
                            minlength="6" aria-label="Senha">
                    </div>

                    <div class="login-actions mt-2 flex-col gap-1">
                        <button type="submit" class="btn-primary w-full p-1 bg-cliente">
                            <i class="ph ph-user-plus"></i> Abrir Conta de Cliente
                        </button>
                        <div class="auth-link-center">
                            <a href="#" onclick="toggleForm('login')" class="auth-link-secondary">Já tenho conta? Voltar
                                ao
                                Login</a>
                        </div>
                    </div>
                </form>

                <!-- Esqueci a Senha -->
                <form id="formForgot" class="login-form d-none" onsubmit="handleForgot(event)">
                    <div class="input-group">
                        <label for="email_forgot" class="visually-hidden">E-mail de recuperação</label>
                        <i class="ph ph-envelope-simple"></i>
                        <input id="email_forgot" type="email" placeholder="Seu E-mail cadastrado" required
                            aria-label="E-mail de recuperação">
                    </div>

                    <div class="login-actions mt-2 flex-col gap-1">
                        <button type="submit" class="btn-primary w-full p-1">
                            <i class="ph ph-paper-plane-tilt"></i> Enviar Link de Recuperação
                        </button>
                        <div class="auth-link-center">
                            <a href="#" onclick="toggleForm('login')" class="auth-link-secondary">Voltar ao Login</a>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Supabase CDN & Relacionados -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabaseClient.js"></script>
    <script src="assets/js/authSetup.js"></script> <!-- Script para gerar contas iniciais no console -->

    <!-- Scripts Base -->
    <script src="assets/js/menu.js"></script>

    <script>
        // Função para alternar entre as telas de formulário
        function toggleForm(formType) {
            document.getElementById('formLogin').style.display = 'none';
            document.getElementById('formRegister').style.display = 'none';
            document.getElementById('formForgot').style.display = 'none';

            if (formType === 'login') {
                document.getElementById('formLogin').style.display = 'block';
            } else if (formType === 'register') {
                document.getElementById('formRegister').style.display = 'block';
            } else if (formType === 'forgot') {
                document.getElementById('formForgot').style.display = 'block';
            }
        }

        // Lógica Global de Autenticação Real do Supabase Web
        async function handleLogin(event) {
            event.preventDefault();

            const btnSubmit = event.target.querySelector('button[type="submit"]');
            const originalText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<i class="ph ph-spinner"></i> Autenticando...';
            btnSubmit.disabled = true;

            const email = document.getElementById('email_login').value;
            const password = document.getElementById('senha_login').value;

            const { data: authData, error: authError } = await window.db.supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (authError) {
                alert('Falha no Login: ' + authError.message);
                btnSubmit.innerHTML = originalText;
                btnSubmit.disabled = false;
                return;
            }

            const userId = authData.user.id;
            const { data: profileObj, error: profileErr } = await window.db.supabase
                .from('profiles')
                .select('role')
                .eq('id', userId)
                .single();

            // Roteador de Cargos
            const cargo = profileObj ? profileObj.role : 'cliente'; // Fallback de fail-safe

            if (cargo === 'cliente') {
                window.location.href = 'pages/dashboard-cliente.html';
            } else if (cargo === 'contador') {
                window.location.href = 'pages/dashboard-contador.html';
            } else if (cargo === 'atendimento') {
                window.location.href = 'pages/dashboard-atendimento.html';
            } else if (cargo === 'admin') {
                window.location.href = 'pages/dashboard-admin.html';
            } else {
                window.location.href = 'pages/dashboard-cliente.html'; // Padrão
            }
        }

        // Lógica de Criação de Conta Exclusiva para Clientes
        async function handleRegister(event) {
            event.preventDefault();

            const btnSubmit = event.target.querySelector('button[type="submit"]');
            const originalText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<i class="ph ph-spinner"></i> Criando conta...';
            btnSubmit.disabled = true;

            const nome = document.getElementById('nome_cadastro').value;
            const email = document.getElementById('email_cadastro').value;
            const password = document.getElementById('senha_cadastro').value;

            // 1. Registra no Auth
            const { data: authData, error: authError } = await window.db.supabase.auth.signUp({
                email: email,
                password: password,
            });

            if (authError) {
                alert('Falha no Cadastro: ' + authError.message);
                btnSubmit.innerHTML = originalText;
                btnSubmit.disabled = false;
                return;
            }

            // Dependendo das configurações do Supabase, o signUp envia um email de confirmação
            if (authData.user && authData.user.identities && authData.user.identities.length === 0) {
                alert('Este e-mail já está em uso.');
                btnSubmit.innerHTML = originalText;
                btnSubmit.disabled = false;
                return;
            }

            const userId = authData.user.id;

            // 2. Cria o Perfil oficial com cargo de "cliente" fixo
            const { error: profileError } = await window.db.supabase
                .from('profiles')
                .upsert([
                    { id: userId, nome: nome, role: 'cliente' }
                ]);

            if (profileError) {
                console.error("Erro ao criar perfil:", profileError);
                // Mesmo assim envia o cliente para frente para não travar a UX
            }

            // 3. Redireciona para o Painel logado
            window.location.href = 'pages/dashboard-cliente.html';
        }

        // Lógica de Recuperação de Senha
        async function handleForgot(event) {
            event.preventDefault();

            const btnSubmit = event.target.querySelector('button[type="submit"]');
            const originalText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<i class="ph ph-spinner"></i> Enviando...';
            btnSubmit.disabled = true;

            const email = document.getElementById('email_forgot').value;

            const { error } = await window.db.supabase.auth.resetPasswordForEmail(email, {
                // Redireciona de volta p/ a home pra trocar a senha
                redirectTo: window.location.origin + window.location.pathname,
            });

            if (error) {
                alert('Ocorreu um erro: ' + error.message);
            } else {
                alert('Enviamos um link de recuperação para o seu e-mail!');
                toggleForm('login');
            }

            btnSubmit.innerHTML = originalText;
            btnSubmit.disabled = false;
        }
    </script>
</body>

</html>
